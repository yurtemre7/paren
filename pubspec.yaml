name: paren
description: "A new Flutter project."
publish_to: "none"
version: 1.11.6+1

environment:
  sdk: ^3.12.0
  flutter: ^3.44.0

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  get:
    git:
      url: https://github.com/yurtemre7/flutter-get
  dio: 5.10.0
  shared_preferences: 2.5.5
  url_launcher: 6.3.2
  share_plus: 13.2.0
  fl_chart: 1.2.0
  home_widget:
    git:
      url: https://github.com/yurtemre7/home_widget
      path: packages/home_widget
  flutter_colorpicker: 1.1.0
  stupid_simple_sheet: 0.9.1+1
  json_annotation: 4.12.0
  liquid_glass_widgets: ^0.19.5
  cupertino_calendar_picker: ^2.2.6
  # image_picker: 1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: 6.0.0
  # `flutter pub run flutter_launcher_icons:main`
  flutter_launcher_icons: 0.14.4
  json_serializable: 6.14.0
  # `dart run build_runner build`
  build_runner: 2.15.0
  # `dart run msix:create`
  msix: 3.18.0
  integration_test:
    sdk: flutter

msix_config:
  display_name: Paren
  publisher_display_name: emredev
  identity_name: de.emredev.paren
  logo_path: "assets/icon/icon.png"
  capabilities: internetClient

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 24
  remove_alpha_ios: true
  adaptive_icon_background: "assets/icon/back.png"
  adaptive_icon_foreground: "assets/icon/fore.png"
  adaptive_icon_monochrome: "assets/icon/mono.png"
  macos:
    generate: true
    image_path: "assets/icon/icon.png"

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icon/

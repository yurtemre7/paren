name: 🚀 Flutter Release Build

on:
  push:
    branches: [release]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────
  # 1. Extract version info (shared across build jobs)
  # ─────────────────────────────────────────
  version:
    name: 🏷️ Resolve Version
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.ver.outputs.version_name }}
      build_number: ${{ steps.ver.outputs.build_number }}
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🔢 Extract version + commit count
        id: ver
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1 | xargs)
          BUILD_NUMBER=$(git rev-list --count HEAD)
          TAG="v${VERSION}+${BUILD_NUMBER}"
          echo "version_name=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "build_number=${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "📌 Version: ${VERSION} | Build: ${BUILD_NUMBER} | Tag: ${TAG}"

  # ─────────────────────────────────────────
  # 2a. Android APK build
  # ─────────────────────────────────────────
  build-apk:
    name: 🤖 Build Android APK
    runs-on: ubuntu-latest
    needs: version
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 📄 Load versions
        id: versions
        run: |
          source .github/versions.env
          echo "flutter_version=${FLUTTER_VERSION}" >> "$GITHUB_OUTPUT"
          echo "cmake_version=${CMAKE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.versions.outputs.flutter_version }}
          channel: stable
          cache: true

      - name: ☕ Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: 🗄️ Cache Gradle & Android SDK components
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            /usr/local/lib/android/sdk/cmake
          key: android-cmake-v${{ steps.versions.outputs.cmake_version }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: android-cmake-v${{ steps.versions.outputs.cmake_version }}-

      - name: 🔑 Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks

      - name: 📝 Write key.properties
        run: |
          cat > android/app/key.properties <<EOF
          storeFile=keystore.jks
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyAlias=upload
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: 📦 Get dependencies
        run: flutter pub get

      - name: 🔨 Build APK (release)
        run: |
          flutter build apk --release \
            --build-name=${{ needs.version.outputs.version_name }} \
            --build-number=${{ needs.version.outputs.build_number }}

      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: paren-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  # ─────────────────────────────────────────
  # 2b. Windows MSIX build
  # ─────────────────────────────────────────
  build-windows:
    name: 🪟 Build Windows MSIX
    runs-on: windows-latest
    needs: version
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 📄 Load versions
        id: versions
        run: |
          Get-Content .github/versions.env | ForEach-Object {
            $k, $v = $_ -split '='
            echo "${k}=${v}" >> $env:GITHUB_OUTPUT
          }

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.versions.outputs.flutter_version }}
          channel: stable
          cache: true

      - name: 📦 Get dependencies
        run: flutter pub get

      - name: 🔨 Build Windows (release)
        run: |
          flutter build windows --release `
            --build-name=${{ needs.version.outputs.version_name }} `
            --build-number=${{ needs.version.outputs.build_number }}

      - name: 📦 Create MSIX package
        run: dart run msix:create --install-certificate=false

      - name: 📤 Upload MSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: paren-windows-msix
          path: build/windows/x64/runner/Release/*.msix
          if-no-files-found: error

  # ─────────────────────────────────────────
  # 2c. Linux build
  # ─────────────────────────────────────────
  build-linux:
    name: 🐧 Build Linux
    runs-on: ubuntu-latest
    needs: version
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 📄 Load versions
        id: versions
        run: |
          source .github/versions.env
          echo "flutter_version=${FLUTTER_VERSION}" >> "$GITHUB_OUTPUT"

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.versions.outputs.flutter_version }}
          channel: stable
          cache: true

      - name: 🛠️ Install Linux build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev libblkid-dev liblzma-dev

      - name: 📦 Get dependencies
        run: flutter pub get

      - name: 🔨 Build Linux (release)
        run: |
          flutter build linux --release \
            --build-name=${{ needs.version.outputs.version_name }} \
            --build-number=${{ needs.version.outputs.build_number }}

      - name: 🗜️ Bundle Linux release
        run: |
          cd build/linux/x64/release/bundle
          tar -czf ../../../../../paren-linux.tar.gz .

      - name: 📤 Upload Linux artifact
        uses: actions/upload-artifact@v7
        with:
          name: paren-linux-bundle
          path: paren-linux.tar.gz
          if-no-files-found: error

  # ─────────────────────────────────────────
  # 3. Create GitHub Release (all builds done)
  # ─────────────────────────────────────────
  release:
    name: 🎉 Create GitHub Release
    runs-on: ubuntu-latest
    needs: [version, build-apk, build-windows, build-linux]
    permissions:
      contents: write
    steps:
      - name: 📥 Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist/

      - name: 🏷️ Create Release & Upload Assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: "Par円 ${{ needs.version.outputs.tag }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/paren-android-apk/app-release.apk
            dist/paren-windows-msix/*.msix
            dist/paren-linux-bundle/paren-linux.tar.gz
